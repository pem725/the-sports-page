name: Autopublish Daily Issue

on:
  schedule:
    # Primary: 4:30am ET = 8:30 UTC
    # Backup:  5:30am ET = 9:30 UTC (catches GitHub cron misses)
    # The script's already_published_today() guard prevents double-publishes,
    # so running twice is safe — the second invocation exits immediately.
    # During EDT (Mar-Nov): fires at 4:30am / 5:30am ET
    # During EST (Nov-Mar): fires at 3:30am / 4:30am ET (one hour early — acceptable)
    - cron: '30 8 * * 1-6'   # Mon-Sat primary
    - cron: '30 9 * * 1-6'   # Mon-Sat backup

  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

permissions:
  contents: write    # push commits
  issues: write      # create failure issues

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for git log

      - name: Configure git identity
        run: |
          git config user.name "The Sports Page Bot"
          git config user.email "sports-page-bot@users.noreply.github.com"

      - name: Run autopublish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/autopublish.py

      - name: Verify push succeeded
        run: |
          echo "Last commit:"
          git log --oneline -1
          echo ""
          echo "Published files:"
          ls published/ | wc -l
