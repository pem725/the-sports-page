name: Autopublish Daily Issue

on:
  schedule:
    # IMPORTANT — GitHub Actions free-tier scheduled workflows fire LATE,
    # not on time. Observed delay 1.5–2.5 hours when scheduled at the
    # popular 8:30/9:30 UTC slot (start-of-hour high-load windows).
    # See: https://docs.github.com/en/actions/reference/events-that-trigger-workflows#schedule
    #
    # Strategy: schedule earlier and at off-hour minutes to land in a
    # lower-load window, plus stack several entries spread across ~3
    # hours so at least one fires by the target time.
    #
    # already_published_today() guard in scripts/autopublish.py means only
    # the first run to succeed does work; subsequent runs exit immediately.
    # Safe to over-schedule.
    #
    # During EDT (Mar–Nov), the four cron entries below map to:
    #   2:30 AM ET → delayed avg ~4:00 AM ET (primary; this should be
    #                the one that wins the race on most mornings)
    #   3:00 AM ET → delayed avg ~4:30 AM ET (1st backup)
    #   4:30 AM ET → delayed avg ~6:00 AM ET (2nd backup)
    #   5:30 AM ET → delayed avg ~7:00 AM ET (3rd backup — final safety)
    #
    # During EST (Nov–Mar), subtract one hour from each ET time. Still fine.
    - cron: '30 6 * * 1-6'   # 06:30 UTC — 2:30 AM EDT — earliest
    - cron: '0 7 * * 1-6'    # 07:00 UTC — 3:00 AM EDT
    - cron: '30 8 * * 1-6'   # 08:30 UTC — 4:30 AM EDT — was original primary
    - cron: '30 9 * * 1-6'   # 09:30 UTC — 5:30 AM EDT — was original backup

  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:

permissions:
  contents: write    # push commits
  issues: write      # create failure issues

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for git log

      - name: Configure git identity
        run: |
          git config user.name "The Sports Page Bot"
          git config user.email "sports-page-bot@users.noreply.github.com"

      - name: Run autopublish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/autopublish.py

      - name: Verify push succeeded
        run: |
          echo "Last commit:"
          git log --oneline -1
          echo ""
          echo "Published files:"
          ls published/ | wc -l
